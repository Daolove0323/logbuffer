spring:
  application.name: logbuffer

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/logbuffer
    username: ${MYSQL_USER_NAME}
    password: ${MYSQL_PASSWORD}
  jpa:

    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true

image:
  api-url: http://localhost:8080/api/images
  post-directory: post
  post-thumbnail-directory: post_th
  storage-path: src/main/resources/static/images

post:
  preview-max-length: 50